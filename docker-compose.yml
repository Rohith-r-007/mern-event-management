services:

  mongodb:
    image: mongo:8
    container_name: gatherly-mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend

    container_name: gatherly-backend

    ports:
      - "3000:3000"

    depends_on:
      - mongodb

    env_file:
      - ./backend/.env

    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongodb:27017/gatherly
      JWT_SECRET: your_secret

  frontend:
    build:
      context: ./frontend

    container_name: gatherly-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  mongo_data: